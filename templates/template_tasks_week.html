<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Planning cultures</title>

<style>
body{
    font-family:system-ui,-apple-system,Segoe UI,Roboto;
    margin:0;
    background:#f4f6f8;
}

.container{
    background:#2e7d32;
    padding:10px;
}

.section-title{
    color:white;
    font-weight:600;
    margin:10px 5px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:10px;
    overflow:hidden;
    margin-bottom:20px;
}

th, td{
    padding:8px;
    font-size:13px;
    text-align:center;
}

th{
    background:#e8f5e9;
}

td{
    border-top:1px solid #eee;
}

.green{ background:#BADE1B; }
.yellow{ background:#EBDE4D; }
.red{ background:#E8978B; }

.timeline{
    position:relative;
    height:10px;
    background:#eee;
    border-radius:6px;
}

.grow{
    position:absolute;
    height:10px;
    background:#66bb6a;
    border-radius:6px;
}

.harvest{
    position:absolute;
    height:10px;
    background:#2e7d32;
    border-radius:6px;
}
.location{
    cursor:pointer;
    font-weight:600;
}

.location:hover{
    text-decoration:underline;
}

.itk{
    cursor:pointer;
    font-weight:600;
}

.itk:hover{
    text-decoration:underline;
}

.small{
    font-size:12px;
    color:#555;
}

</style>
</head>

<body>

<div class="container">

<div class="section-title">⏱ En retard</div>
<table>
<thead>
<tr>
<th>Planche</th>
<th>Culture</th>
<th>Semis</th>
<th>Transplant</th>
<th>Calendrier</th>
</tr>
</thead>
<tbody id="late-body"></tbody>
</table>

<div class="section-title">🔥 À faire cette semaine</div>
<table>
<thead>
<tr>
<th>Planche</th>
<th>Culture</th>
<th>Semis</th>
<th>Transplant</th>
<th>Calendrier</th>
</tr>
</thead>
<tbody id="current-body"></tbody>
</table>

</div>

<script>

const crops = __DATA__

const currentWeek = new Date()
const onejan = new Date(currentWeek.getFullYear(),0,1)
const week = Math.ceil((((currentWeek - onejan) / 86400000) + onejan.getDay()+1)/7)

const minWeek = 10
const maxWeek = 48
const span = maxWeek - minWeek

function percent(w){
    return ((w-minWeek)/span)*100
}

function getState(c){
    if(
        (c.sowing_week && week > c.sowing_week) ||
        (c.grow_start && week > c.grow_start)
    ){
        return "planning_late"
    }

    if(
        week === c.sowing_week ||
        week === c.grow_start
    ){
        return "planning_current"
    }

    return null
}

function renderRow(c){

    const growLeft = percent(c.grow_start)
    const growWidth = percent(c.grow_end) - growLeft

    const harvestLeft = percent(c.harvest_start)
    const harvestWidth = percent(c.harvest_end) - harvestLeft

    let sowClass=""
    let transplantClass=""

    if(c.sowing_done) sowClass="green"
    else if(week == c.sowing_week) sowClass="yellow"
    else if(week > c.sowing_week) sowClass="red"

    if(c.transplanting_done) transplantClass="green"
    else if(week == c.grow_start) transplantClass="yellow"
    else if(week > c.grow_start) transplantClass="red"

    return `
<tr>
<td class="location" onclick="openCalendar()">
${c.block} •
<span class="small">${c.garden} • ${c.bed}</span>
</td>

<td class="itk" onclick="openItkCrop('${c.Culture}')">
${c.Culture}
</td>

<td class="${sowClass}">
${c.sowing_week || ""}
</td>

<td class="${transplantClass}">
${c.grow_start || ""}
</td>

<td>
<div class="timeline">
<div class="grow" style="left:${growLeft}%;width:${growWidth}%"></div>
<div class="harvest" style="left:${harvestLeft}%;width:${harvestWidth}%"></div>
</div>
</td>
</tr>`
}

function isLate(c){
    return (
        (c.sowing_week && !c.sowing_done && week > c.sowing_week) ||
        (c.grow_start && !c.transplanting_done && week > c.grow_start)
    )
}

function isCurrent(c){
    return (
        (c.sowing_week && !c.sowing_done && week === c.sowing_week) ||
        (c.grow_start && !c.transplanting_done && week === c.grow_start)
    )
}

function openItkCrop(name){
    const encoded = encodeURIComponent(name)
    window.location.href = `itk.html?crop=${encoded}`
}

function openCalendar(){
    window.location.href = `calendrier.html`
}

function render(){

    const late = []
    const current = []

    crops.forEach(c => {
        if(isLate(c)){
            late.push(c)
        } else if(isCurrent(c)){
            current.push(c)
        }
    })

    document.getElementById("late-body").innerHTML =
        late.map(renderRow).join("")

    document.getElementById("current-body").innerHTML =
        current.map(renderRow).join("")
}

render()

</script>

</body>
</html>
