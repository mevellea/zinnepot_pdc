<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Contacts</title>

<style>

body {
    font-family: system-ui, -apple-system, Segoe UI, Roboto;
    background: #eef6ff;
    margin: 0;
    padding: 12px;
}

/* 🔍 SEARCH */
#search {
    position: sticky;
    top: 0;
    z-index: 10;
    width: 100%;
    padding: 14px;
    margin-bottom: 15px;
    font-size: 16px;
    border-radius: 12px;
    border: 1px solid #ccc;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

/* CONTAINER */
.container {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
}

/* CARD */
.card {
    background: white;
    border-radius: 16px;
    padding: 14px;
    box-shadow: 0 8px 18px rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
}

/* TITLE */
.card h3 {
    margin: 0;
    font-size: 18px;
    color: #1f4e8c;
}

/* TOP */
.top {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* BLOCKS */
.left, .right {
    background: #f7faff;
    border-radius: 12px;
    padding: 10px;
}

/* SECTION LABELS */
.left::before {
    content: "Contact";
    font-size: 12px;
    font-weight: 600;
    color: #6b8bbd;
    display: block;
    margin-bottom: 6px;
}

.right::before {
    content: "Infos";
    font-size: 12px;
    font-weight: 600;
    color: #6b8bbd;
    display: block;
    margin-bottom: 6px;
}

/* FIELDS */
.field {
    font-size: 14px;
    margin-bottom: 6px;
    line-height: 1.4;
}

.label {
    font-weight: 600;
    color: #333;
}

/* NOTES */
.bottom {
    background: #edf3ff;
    border-radius: 12px;
    padding: 10px;
}

.notes {
    padding-left: 16px;
    margin: 0;
    font-size: 14px;
}

/* 📱 FORCE SINGLE COLUMN */
@media (max-width: 699px) {
    .container {
        display: flex;
        flex-direction: column;
    }

    .card {
        width: 100%;
    }
}

/* 💻 DESKTOP */
@media (min-width: 700px) {
    .container {
        grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    }

    .top {
        flex-direction: row;
    }
}

</style>

</head>

<body>

<input type="text" id="search" placeholder="Rechercher...">

<div class="container" id="container"></div>

<script>

const data = __DATA__

function render(list){

    const container = document.getElementById("container")
    container.innerHTML = ""

    list.forEach(item => {

        const card = document.createElement("div")
        card.className = "card"

        const leftFields = Object.entries(item)
            .filter(([k]) => ["Nom","Prenom","Tel","Email"].includes(k))

        const rightFields = Object.entries(item)
            .filter(([k]) => !["Nom","Prenom","Tel","Email","Notes"].includes(k))

        const notes = item.Notes ? item.Notes.split("\n") : []

        card.innerHTML = `
            <h3>${item.Nom || ""} ${item.Prenom || ""}</h3>

            <div class="top">
                <div class="left">
                    ${leftFields.map(([k,v]) => `
                        <div class="field">
                            <span class="label">${k}:</span>
                            ${k.toLowerCase().includes("tel") ? `<a href="tel:${v}">${v}</a>` : v || ""}
                        </div>
                    `).join("")}
                </div>

                <div class="right">
                    ${rightFields.map(([k,v]) => `
                        <div class="field">
                            <span class="label">${k}:</span> ${v || ""}
                        </div>
                    `).join("")}
                </div>
            </div>

            ${notes.length ? `
                <div class="bottom">
                    <ul class="notes">
                        ${notes.map(n => `<li>${n}</li>`).join("")}
                    </ul>
                </div>
            ` : ""}
        `

        container.appendChild(card)
    })
}

/* 🔍 SEARCH */
document.getElementById("search").addEventListener("input", e => {
    const q = e.target.value.toLowerCase()

    const filtered = data.filter(item =>
        Object.values(item).some(v =>
            String(v).toLowerCase().includes(q)
        )
    )

    render(filtered)
})

render(data)

</script>

</body>
</html>
