<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Abonnés</title>



<style>

body {
    font-family: Arial;
    background: #eef6ff;
    margin: 0;
    padding: 10px;
}


#search {



    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #ccc;

}

/* GRID */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 15px;
}

/* CARD */
.card {
    background: white;
    border-radius: 14px;
    padding: 15px;
    box-shadow: 0 6px 14px rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
    gap: 12px;

}

.card h3 {
    margin: 0;
    color: #2a5d9f;

}

/* TOP SPLIT */
.top {
    display: flex;

    gap: 10px;
}


.left, .right {
    flex: 1;
    background: #f7faff;
    border-radius: 10px;
    padding: 10px;
}

/* BOTTOM */
.bottom {
    background: #f0f4ff;
    border-radius: 10px;
    padding: 10px;
}

/* FIELDS */
.field {
    font-size: 13px;
    margin-bottom: 6px;
}

.label {
    font-weight: bold;
    color: #444;

}

/* LIST STYLE */
.notes {
    padding-left: 18px;
    margin: 0;

}

.notes li {
    margin-bottom: 5px;








}

/* MOBILE */
@media (max-width: 600px) {




    .top {
        flex-direction: column;
    }
}

</style>

</head>

<body>

<input type="text" id="search" placeholder="🔍 Filtrer...">
<div class="container" id="cards"></div>


<script>
const data = {{ json_data | safe }};
const container = document.getElementById("cards");

// tri
data.sort((a, b) => (a.name || "").localeCompare(b.name || "", 'fr', { sensitivity: 'base' }));










function render(items) {
    container.innerHTML = "";

    items.forEach(item => {


        let html = `
        <div class="card">
            <h3>${item.name || "Fiche"}</h3>


            <div class="top">
                <div class="left">
        `;

        // LEFT = contact
        Object.entries(item.col1).forEach(([k, v]) => {
            if (v) {
                html += `
                <div class="field">
                    <span class="label">${k}:</span> ${v}
                </div>`;
            }
        });

        html += `</div><div class="right">`;

        // RIGHT = misc
        Object.entries(item.col2).forEach(([k, v]) => {
            if (v) {
                html += `
                <div class="field">
                    <span class="label">${k}:</span> ${v}
                </div>`;
            }
        });

        html += `
                </div>
            </div>

            <div class="bottom">
                <ul class="notes">
        `;

        // BOTTOM = list
        if (item.notes && item.notes.length) {
            item.notes.forEach(n => {
                html += `<li>${n}</li>`;
            });
        }

        html += `
                </ul>
            </div>
        </div>
        `;

        container.innerHTML += html;
    });
}






render(data);



// 🔎 filtre
document.getElementById("search").addEventListener("input", e => {
    const val = e.target.value.toLowerCase();

    const filtered = data.filter(item =>
        JSON.stringify(item).toLowerCase().includes(val)
    );








    render(filtered);
});
</script>

</body>
</html>
