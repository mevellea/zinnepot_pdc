<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Crop Planner</title>

<style>

body{
font-family:system-ui,Segoe UI,Arial;
background:#f4f6fa;
margin:20px;
font-size:18px;
}

h1{
font-size:28px;
margin-bottom:15px;
}

#search{
width:100%;
padding:14px;
font-size:18px;
border-radius:10px;
border:1px solid #ccc;
margin-bottom:20px;
}

.container{
display:flex;
flex-direction:column;
gap:14px;
}

.card{

background:white;
border-radius:14px;
padding:18px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
cursor:pointer;
transition:all 0.2s;
}

.card:hover{
transform:scale(1.01);
}

.title{
font-size:22px;
font-weight:600;
}

.details{
margin-top:12px;
display:none;
}

.row{
display:flex;
justify-content:space-between;
padding:6px 0;
border-bottom:1px solid #eee;
}

.key{
font-weight:600;
}

.value{
text-align:right;
}

@media (max-width:600px){

body{
font-size:20px;
}

.title{
font-size:24px;
}

}

</style>

</head>

<body>

<h1>__TITLE__</h1>

<input id="search" placeholder="Search crops...">

<div class="container" id="list"></div>


<script>

const params = new URLSearchParams(window.location.search)
const cropToOpen = params.get("crop")

const crops = __DATA__

let filtered = crops.slice();

const list = document.getElementById("list");

function render(){

    list.innerHTML="";
    filtered.forEach((crop,i)=>{

        let card=document.createElement("div");
        card.className="card";
        let title=crop["Culture"] || "Culture";
        card.dataset.crop = title;
        let html=`<div class="title">${title}</div>`;
        html+=`<div class="details">`;
        for(let k in crop){
            let v=crop[k];
            if(v==="") continue;
            html+=`
            <div class="row">
            <div class="key">${k}</div>
            <div class="value">${v}</div>
            </div>
            `;
        }
        html+=`</div>`;

        card.innerHTML=html;

        let details = card.querySelector(".details")

        if (cropToOpen && title === cropToOpen) {
            details.style.display = "block"
            setTimeout(()=>{
                card.scrollIntoView({behavior:"smooth", block:"center"})
            },100)
        }

        card.onclick=()=>{
            let d=card.querySelector(".details");
            d.style.display =
            d.style.display==="block"
            ? "none"
            : "block";
        };
        list.appendChild(card);
    });
}

document.getElementById("search").addEventListener("input",e=>{
    let q=e.target.value.toLowerCase();
    filtered=crops.filter(c=>
        JSON.stringify(c).toLowerCase().includes(q)
    );
    render();
});

render();

</script>

</body>
</html>
